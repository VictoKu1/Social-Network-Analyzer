<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Social Network Analyzer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      #stepB,
      #stepC,
      #analysisResult {
        display: none; /* hidden by default, shown by JS */
      }
      .valid-mark {
        font-weight: bold;
        margin-left: 5px;
      }
      .valid {
        color: green;
      }
      .invalid {
        color: red;
      }
      .button {
        margin: 10px 0;
      }
      textarea {
        width: 100%;
        height: 100px;
      }
    </style>
  </head>
  <body>
    <h1>Social Network Analyzer</h1>

    <!-- STEP A: Select Number of Links -->
    <div id="stepA">
      <label for="numLinks">How many social network links do you want to provide?</label><br /><br />
      <select id="numLinks">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
      <button class="button" onclick="generateLinkFields()">Next</button>
    </div>

    <!-- STEP B: Input links, Validate each link -->
    <div id="stepB">
      <h3>Enter your social network links</h3>
      <div id="linksContainer"></div>
      <button class="button" onclick="validateAllLinks()">Validate Links</button>
      <br />
      <div id="validationResults"></div>
      <button id="continueBtn" class="button" onclick="showStepC()">Continue</button>
    </div>

    <!-- STEP C: Personal Description + Analyze -->
    <div id="stepC">
      <h3>Personal Description</h3>
      <textarea id="personalDescription" placeholder="Describe the person briefly"></textarea>
      <br />
      <button class="button" onclick="analyzeAll()">Analyze</button>
    </div>

    <!-- Final Output -->
    <div id="analysisResult">
      <h3>Analysis Result</h3>
      <div id="analysisText" style="white-space: pre-wrap;"></div>
    </div>

    <script>
      let linksCount = 2 // default
      let validLinksInfo = [] // Will store { url, is_valid, platform }
      
      function generateLinkFields() {
        // Get the number from the select
        const select = document.getElementById('numLinks')
        linksCount = parseInt(select.value)
      
        // Show Step B
        document.getElementById('stepB').style.display = 'block'
        document.getElementById('stepA').style.display = 'none'
      
        // Create input fields
        const container = document.getElementById('linksContainer')
        container.innerHTML = ''
        for (let i = 0; i < linksCount; i++) {
          const input = document.createElement('input')
          input.type = 'text'
          input.id = `link_${i}`
          input.style.width = '80%'
          input.placeholder = 'https://twitter.com/... or https://instagram.com/...'
          container.appendChild(input)
      
          const span = document.createElement('span')
          span.id = `validMark_${i}`
          span.className = 'valid-mark'
          container.appendChild(span)
      
          const br = document.createElement('br')
          container.appendChild(br)
        }
      
        // Hide 'Continue' until validation is done
        document.getElementById('continueBtn').style.display = 'none'
      }
      
      function validateAllLinks() {
        // Gather links
        const links = []
        for (let i = 0; i < linksCount; i++) {
          const val = document.getElementById(`link_${i}`).value.trim()
          links.push(val)
        }
      
        // Send to server for validation
        fetch('/validate_links', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ links })
        })
          .then((res) => res.json())
          .then((data) => {
            // data.results => array of { url, is_valid, platform }
            // data.all_valid => boolean
            const results = data.results
            const allValid = data.all_valid
      
            validLinksInfo = [] // reset
      
            for (let i = 0; i < results.length; i++) {
              const markSpan = document.getElementById(`validMark_${i}`)
              if (results[i].is_valid) {
                markSpan.textContent = ' ✓'
                markSpan.classList.remove('invalid')
                markSpan.classList.add('valid')
                validLinksInfo.push({
                  url: results[i].url,
                  platform: results[i].platform
                })
              } else {
                markSpan.textContent = ' ✗'
                markSpan.classList.remove('valid')
                markSpan.classList.add('invalid')
              }
            }
      
            // Show or hide the "Continue" button
            if (allValid) {
              document.getElementById('continueBtn').style.display = 'inline-block'
            } else {
              document.getElementById('continueBtn').style.display = 'none'
            }
          })
          .catch((err) => console.error('Error validating links:', err))
      }
      
      function showStepC() {
        document.getElementById('stepC').style.display = 'block'
        document.getElementById('stepB').style.display = 'none'
      }
      
      function analyzeAll() {
        // Get personal description
        const personalDesc = document.getElementById('personalDescription').value.trim()
        if (!personalDesc) {
          alert('Please provide a personal description before analyzing.')
          return
        }
      
        // Send final data (links + personal description)
        const bodyData = {
          links_info: validLinksInfo,
          personal_description: personalDesc
        }
      
        fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyData)
        })
          .then((res) => res.json())
          .then((data) => {
            // data.analysis => the text from OpenAI
            document.getElementById('analysisResult').style.display = 'block'
            document.getElementById('analysisText').textContent = data.analysis
            // Hide stepC or keep it displayed, your call
            // document.getElementById("stepC").style.display = "none";
          })
          .catch((err) => console.error('Error analyzing data:', err))
      }
    </script>
  </body>
</html>
